#Act as a DevOps engineer. Create a GitHub Actions CI pipeline for a full-stack project with server (Node.js) and client (React). The pipeline should trigger on push and pull requests to the main branch, run on Ubuntu, and use Node.js 20. It should check out the code, verify the Node version, install dependencies in both server and client folders, and build the client using npm run build. Generate a clean and complete .github/workflows/ci.yml file.
name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔥 FIX: Use Node 20
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # SERVER
      - name: Install server dependencies
        run: |
          cd server
          npm install

      # CLIENT
      - name: Install client dependencies
        run: |
          cd client
          npm install

      - name: Build client
        run: |
          cd client
          npm run build